# Exemple de configuration nginx pour FactPulse Billing App
#
# Adaptez YOUR_DOMAIN à votre domaine réel, puis :
#   sudo cp nginx/example.conf /etc/nginx/sites-available/factpulse-billing
#   sudo ln -s /etc/nginx/sites-available/factpulse-billing /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Pour le SSL, utilisez certbot :
#   sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirection HTTP → HTTPS (certbot ajoutera les directives SSL)
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # Les directives ssl_certificate / ssl_certificate_key seront ajoutées par certbot.
    # Si vous gérez SSL manuellement, décommentez et adaptez :
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }
}
