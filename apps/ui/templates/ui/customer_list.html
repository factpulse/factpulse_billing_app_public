{% extends "base.html" %}
{% block title %}
    Clients — FactPulse Billing
{% endblock title %}
{% block content %}
    <div class="topbar">
        <h1>Clients</h1>
        <div class="topbar-actions">
            {% if show_archived %}
                <a href="{% url 'ui:customer_list' %}"
                   role="button"
                   class="outline btn-sm">Masquer archivés</a>
            {% else %}
                <a href="{% url 'ui:customer_list' %}?archived=1"
                   role="button"
                   class="outline btn-sm">Voir archivés</a>
            {% endif %}
            <a href="{% url 'ui:customer_create' %}" role="button">Nouveau client</a>
        </div>
    </div>
    <input type="search"
           placeholder="Rechercher..."
           hx-get="{% url 'ui:customer_list' %}"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#customer-table"
           name="search">
    <div id="customer-table">{% include "ui/partials/customer_table.html" %}</div>
{% endblock content %}
