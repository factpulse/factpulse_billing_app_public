# Self-hosted all-in-one stack with Caddy for automatic SSL
#
# Usage:
#   cp .env.example .env   # edit values
#   docker compose -f docker-compose.selfhosted.yml up -d
#
# Set DOMAIN=your-domain.com in .env for Let's Encrypt SSL.
# Default (localhost) uses Caddy's internal CA (self-signed).

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factpulse}
      POSTGRES_USER: ${POSTGRES_USER:-factpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factpulse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-setup:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${AWS_ACCESS_KEY_ID:-minioadmin} $${AWS_SECRET_ACCESS_KEY:-minioadmin};
      mc mb local/$${AWS_STORAGE_BUCKET_NAME:-factpulse} --ignore-existing;
      exit 0;
      "

  web:
    build: .
    env_file: .env
    environment:
      SECURE_SSL_REDIRECT: "false"
      ALLOWED_HOSTS: ${DOMAIN:-localhost},web
      CSRF_TRUSTED_ORIGINS: https://${DOMAIN:-localhost},http://${DOMAIN:-localhost}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:-localhost},http://${DOMAIN:-localhost}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery-worker:
    build: .
    command: uv run celery -A config worker -l info --concurrency 2
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    command: uv run celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
